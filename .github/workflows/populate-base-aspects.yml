name: Populate base aspects

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Populate base_aspects lookup
        run: node scripts/populate-base-aspects.mjs
        env:
          INFLUXDB_URL: ${{ vars.INFLUXDB_URL }}
          INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG: ${{ vars.INFLUXDB_ORG }}
